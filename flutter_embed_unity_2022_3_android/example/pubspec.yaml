name: flutter_embed_unity_android_example
description: Demonstrates how to use the flutter_embed_unity_android plugin.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_embed_unity_2022_3_android: ^2.0.0-dev.1
  flutter_embed_unity: ^2.0.0-dev.2
  intl: any


dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
