name: flutter_embed_unity_example
description: Demonstrates how to use the flutter_embed_unity plugin.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.24.0"  # 3.24 is minimum for SPM support

dependencies:
  flutter:
    sdk: flutter

  flutter_embed_unity: ^2.0.0
  # To target Unity 2022.3, uncomment this to override the default Android implementation:
  # flutter_embed_unity_2022_3_android: ^1.1.5
  intl: any


dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true
